pan class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  for (int i = 0; i &lt; n; i++) &#123;</span><br><span class="line"></span><br><span class="line">​    result[index] = set[i];</span><br><span class="line"></span><br><span class="line">​    generateCombinations(set, n, k, result, index + 1);</span><br><span class="line"></span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
